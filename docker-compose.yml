services:
  app:
    # Uncomment the image line and remove the build section to use a prebuilt Docker Hub image.
    # image: blackcat-v1:latest
    build:
      context: .
      dockerfile: Dockerfile
      # Pass build metadata for local images. VERSION defaults to the current branch or "dev".
      args:
        VERSION: ${VERSION:-dev}
        GIT_TAG: ${GIT_TAG:-${VERSION:-dev}}
        GITHUB_REPO_URL: ${GITHUB_REPO_URL:-}
    container_name: blackcat-v1
    ports:
      - "${SERVER_PORT:-80}:8080"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - DB_URL=${DB_URL:-jdbc:mysql://mysql:3306/blackcat_v1?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - SERVER_PORT=8000
      # The following secrets must be provided through .env or environment variables.
      # Generate them with:
      #   openssl rand -hex 32  # ADMIN_RESET_PASSWORD_KEY
      #   openssl rand -hex 64  # JWT_SECRET / ENCRYPTION_KEY
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - ADMIN_RESET_PASSWORD_KEY=${ADMIN_RESET_PASSWORD_KEY:?ADMIN_RESET_PASSWORD_KEY is required}
      # Optional log levels. Defaults: root=WARN, app=INFO.
      # Allowed values: TRACE, DEBUG, INFO, WARN, ERROR, OFF
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-WARN}
      - LOG_LEVEL_APP=${LOG_LEVEL_APP:-INFO}
      # Allow pre-release version checks.
      - ALLOW_PRERELEASE=${ALLOW_PRERELEASE:-false}
      - GITHUB_REPO=${GITHUB_REPO:-}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blackcat-v1-network

  mysql:
    image: mysql:8.1
    container_name: blackcat-v1-mysql
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - MYSQL_DATABASE=blackcat_v1
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:?DB_PASSWORD is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - blackcat-v1-network

volumes:
  mysql-data:

networks:
  blackcat-v1-network:
    driver: bridge
