spring.application.name=auto-bookkeeping-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=${SERVER_PORT:18001}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.wrbug.polymarketbot=${LOG_LEVEL_APP:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

bookkeeping.titan007.score-data-dirs=${BOOKKEEPING_TITAN007_SCORE_DATA_DIRS:${BOOKKEEPING_TITAN007_SCORE_DATA_DIR:data/titan007}}
bookkeeping.titan007.score-data-dir=${BOOKKEEPING_TITAN007_SCORE_DATA_DIR:data/titan007}

encryption.key=${ENCRYPTION_KEY}
