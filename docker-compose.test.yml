services:
  app:
    # Use the pre-release test image.
    image: blackcat-v1:test
    container_name: blackcat-v1-test
    ports:
      - "${SERVER_PORT:-8080}:8080" # Use a different host port to avoid conflicts.
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SPRING_PROFILES_ACTIVE=test # Use the test profile.
      - DB_URL=${DB_URL:-jdbc:mysql://mysql-test:3306/blackcat_v1_test?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - SERVER_PORT=8000
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret-key-for-testing-only}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-test-encryption-key-for-testing-only}
      - ADMIN_RESET_PASSWORD_KEY=${ADMIN_RESET_PASSWORD_KEY:-test-reset-key-for-testing-only}
      - LOG_LEVEL_ROOT=DEBUG
      - LOG_LEVEL_APP=DEBUG
      # Allow pre-release version checks in the test environment.
      - ALLOW_PRERELEASE=true
      - GITHUB_REPO=${GITHUB_REPO:-}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mysql-test:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blackcat-v1-test-network

  mysql-test:
    image: mysql:8.1
    container_name: blackcat-v1-mysql-test
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-testpassword}
      - MYSQL_DATABASE=blackcat_v1_test
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql-test-data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-testpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - blackcat-v1-test-network

volumes:
  mysql-test-data:

networks:
  blackcat-v1-test-network:
    driver: bridge
